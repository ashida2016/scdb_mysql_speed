# Read the Docs 配置文件
# 文档: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - default-libmysqlclient-dev   # mysqlclient 编译所需的 C 头文件
    - pkg-config

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dataframe                # 安装 pandas 以便 autodoc 能解析 DataFrame 相关代码
    - requirements: docs/requirements.txt
